<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
				<title>Reward Zone</title>
				<style>
					/* Mobile-first styling */
					body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; height: 100vh; }

					/* Laptop এ ওপেন করলে মোবাইল স্ক্রিন দেখাবে */
					.mobile-frame { width: 100%; max-width: 480px; height: 100%; background: #000; position: relative; border-left: 1px solid #222; border-right: 1px solid #222; }

					#loader-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
					.spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #f39c12; border-radius: 50%; animation: spin 1s linear infinite; }
					@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
				</style>
			</head>
	<body>

		<div class="mobile-frame">
			<div id="loader-overlay">
				<div class="spinner"></div>
				<p style="margin-top: 15px;">Loading Offers...</p>
			</div>
		</div>

		<script>
			const script = document.createElement('script');
			script.src = 'https://wall.giga.pub/api/v1/loader.js?projectId=6779';
			script.async = true;
			document.head.appendChild(script);

			(window.loadGigaSDKCallbacks || (window.loadGigaSDKCallbacks = [])).push(() => {
			window.loadOfferWallSDK({ projectId: '6779' })
			.then(sdk => {
			window.gigaOfferWallSDK = sdk;
			document.getElementById('loader-overlay').style.display = 'none';
			sdk.open();

			sdk.on('rewardClaim', async (data) => {
			await creditUserReward(data.amount);
			sdk.confirmReward(data.rewardId, data.hash);
			});
			})
			.catch(err => {
			document.getElementById('loader-overlay').innerHTML = "<h3>Network Error.</h3><p>Please host this on a server (e.g. Vercel, Netlify, or Firebase).</p>";
			});
			});

			/* ==========================================================
			START: COIN ADDING LOGIC (EDIT THIS PART FOR PHP/SERVER)
			========================================================== */

			async function creditUserReward(amount) {
			// এই ফাংশনের ভেতরে আপনার ব্যালেন্স অ্যাড করার কোড লিখবেন
			// উদাহরণস্বরূপ Firebase বা PHP API কল করবেন
			console.log("Adding " + amount + " coins to database...");
			alert("Reward Granted: " + amount + " Coins Added!");
			}

			/* ==========================================================
			END: COIN ADDING LOGIC
			========================================================== */
		</script>
	</body>
</html>
