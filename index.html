<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
				<title>Jangia Premium Dashboard</title>
				<!-- Icons এর জন্য লাইব্রেরি -->
				<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
					<style>
						body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; }
						.app-container { width: 100%; max-width: 450px; background: #ffffff; min-height: 100vh; padding-bottom: 20px; }
						.header { background: linear-gradient(135deg, #0a4d3c, #1a7a5a); color: white; padding: 25px 20px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; display: flex; justify-content: space-between; align-items: center; }
						.balance-card { background: white; margin: -20px 20px 20px 20px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
						.balance-card h1 { font-size: 36px; margin: 10px 0; color: #1a7a5a; }

						/* টাস্ক গ্রিড ডিজাইন */
						.task-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; }
						.task-item { text-align: center; cursor: pointer; }
						.task-item i {
						font-size: 24px;
						background: #e8f3f0;
						color: #1a7a5a;
						padding: 15px;
						border-radius: 50%;
						margin-bottom: 8px;
						transition: 0.3s;
						}
						.task-item:hover i { background: #1a7a5a; color: white; }
						.task-item p { margin: 0; font-size: 12px; color: #333; font-weight: 500; }

						.exit-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 10px; }
					</style>
				</head>
	<body>
		<div class="app-container">
			<div class="header">
				<div>
					<p style="margin:0; font-size: 14px; opacity: 0.8;">Welcome,</p>
					<h2 style="margin:0;">Muhtasin Sadmam</h2>
				</div>
				<button class="exit-btn">Exit</button>
			</div>

			<div class="balance-card">
				<p style="margin:0; color: #666;">Total Balance</p>
				<h1>
					450 <span style="font-size: 18px;">Pts</span>
				</h1>
				<p style="margin:0; font-size: 12px; color: #999;">1,000 Pts = 1 USD</p>
			</div>

			<!-- নতুন টাস্ক গ্রিড -->
			<div class="task-grid">
				<div class="task-item">
					<i class="fa-solid fa-gift"></i>
					<p>Reward</p>
				</div>
				<div class="task-item">
					<i class="fa-solid fa-fire"></i>
					<p>Hot Offers</p>
				</div>
				<div class="task-item">
					<i class="fa-solid fa-bolt"></i>
					<p>Quick</p>
				</div>
				<div class="task-item">
					<i class="fa-solid fa-keyboard"></i>
					<p>Captcha</p>
				</div>
			</div>

			<div style="padding: 20px;">
				<p style="font-weight: bold; color: #1a7a5a;">Top Earners Today</p>
				<div style="background: #f9f9f9; padding: 10px; border-radius: 10px; font-size: 14px; color: #666;">
					বাকি কাজগুলো আমরা পরের ধাপে করবো...
				</div>
			</div>
		</div>
	</body>
</html>
