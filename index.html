<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">
				<title>Grifity Dashboard</title>
				<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

					<style>
						/* মেইন বডি সেটআপ */
						body {
						margin: 0;
						font-family: 'Segoe UI', sans-serif;
						background-color: #ffffff; /* নিচের অংশ সাদা থাকবে */
						display: flex;
						justify-content: center;
						}

						.app-container {
						width: 100%;
						max-width: 450px;
						min-height: 100vh;
						background: #ffffff;
						position: relative;
						}

						/* ------------------------------------------- */
						/* DEPARTMENT 1: HEADER (সবুজ অংশ ও কার্ভ) */
						/* ------------------------------------------- */
						.top-header {
						background: linear-gradient(135deg, #033a2e, #044434); /* গাঢ় সবুজ গ্রেডিয়েন্ট */
						padding: 30px 20px 80px 20px; /* নিচে বেশি জায়গা রাখা হয়েছে কার্ভের জন্য */
						display: flex;
						justify-content: space-between;
						align-items: center;
						position: relative;
						}

						.user-info p {
						margin: 0;
						font-size: 14px;
						color: #a0b3af; /* হালকা ধুসর সবুজ টেক্সট */
						}

						.user-info h2 {
						margin: 0;
						font-size: 22px;
						font-weight: bold;
						color: #ffffff;
						}

						/* গোল এক্সিট বাটন */
						.exit-btn-circle {
						background: rgba(255, 255, 255, 0.1);
						border: 1px solid rgba(255, 255, 255, 0.2);
						width: 45px;
						height: 45px;
						border-radius: 50%;
						display: flex;
						justify-content: center;
						align-items: center;
						cursor: pointer;
						}

						/* সাদা কার্ভ শেপ */
						.header-curve {
						position: absolute;
						bottom: -1px;
						left: 0;
						width: 100%;
						height: 40px;
						background: white;
						border-top-left-radius: 40px;
						border-top-right-radius: 40px;
						}
					</style>
				</head>
	<body>

		<div class="app-container">

			<div class="top-header">
				<div class="user-info">
					<p>Good morning!</p>
					<h2>Muhtasin Sadmam</h2>
				</div>

				<div class="exit-btn-circle" onclick="closeApp()">
					<i class="fa-solid fa-power-off" style="color: white; font-size: 18px;"></i>
				</div>

				<div class="header-curve"></div>
			</div>
		</div>

		<script>
			// অ্যাপ বন্ধ করার ফাংশন
			function closeApp() {
			if (window.Telegram && window.Telegram.WebApp) {
			window.Telegram.WebApp.close();
			} else {
			alert("Closing App...");
			}
			}
		</script>
	</body>
</html>
