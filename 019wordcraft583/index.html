		<script type="module">
			// --- স্ক্রিপ্টের একদম শুরুতে একবারই ইনিশিয়ালাইজ করবেন ---
			const rewardedController = window.Adsgram.init({ blockId: "32174" });
			const interstitialController = window.Adsgram.init({ blockId: "int-32178" });

			// অটোমেটিক ইন্টারস্টিশিয়াল (পেইজ লোড হওয়ার ৫ সেকেন্ড পর শুরু হবে)
			show_11042210({
			type: 'inApp',

			frequency: 1,
			capping: 0.15,
			interval: 30,
			timeout: 5,
			everyPage: false

			// --- ফাংশনগুলো ---

			function showAd_id0() {
			show_11042210().then(() => {
			// অ্যাড সাকসেস হলে এই আইডি সেভ হবে
			localStorage.setItem('last_ad_id', 0);

			// টাইমার ও রিওয়ার্ড কল
			start4MinuteTimer();
			triggerAdNetworkRequest();
			}).catch((e) => {
			// অ্যাড লোড না হলে বা এরর হলে পরবর্তী আইডিতে সুইচ করবে

			start4MinuteTimer();
			triggerAdNetworkRequest();

			tryNextAd();

			console.log("ID 1 failed or skipped, switching to next...");

			console.log("ID 2 failed, switching to next...");

			function showAd_id3() {
			window.showGiga().then(() => {
			// ১. অ্যাড সাকসেস হলে আইডি সেভ করুন
			localStorage.setItem('last_ad_id', 3);

			console.log("ID 3 failed, switching to next...");
			tryNextAd();

			function showAd_id4() {
			interstitialController.show().then((result) => {
			// ১. অ্যাড সফলভাবে শেষ হলে আইডি সেভ করুন
			localStorage.setItem('last_ad_id', 4);

			console.log("ID 4 failed, switching to next...");
			tryNextAd();
			});

			function tryNextAd() {
			// ১. টাইমার চেক করা (ads_gap_timer)
			const expiryTime = localStorage.getItem('ads_gap_timer');

			// যদি টাইমার থাকে এবং তা বর্তমান সময়ের চেয়ে বেশি হয় (অর্থাৎ রানিং আছে)
			if (expiryTime && Date.now() < parseInt(expiryTime)) {
        // টাইমার রানিং, তাই পপআপ দেখাবে
        document.getElementById('ad-popup').style.display = 'block';
        return; // অ্যাড লোড করা বন্ধ করবে
    }

				document.getElementById('ad-popup').style.display = 'none';

    // ২. যদি টাইমার না থাকে বা শেষ হয়ে যায় (টাইমার স্টপ)

    let lastId = parseInt(localStorage.getItem('last_ad_id')) || 0;
    let nextId = (lastId + 1) % 5;

    // নতুন আইডি সেভ করে নেয়া (যাতে পরেরবার এর পর থেকে শুরু হয়)
    localStorage.setItem('last_ad_id', nextId);

    console.log("Timer stopped. Trying Ad ID: " + nextId);

    // ৩. আইডি অনুযায়ী কল করা
    switch (nextId) {
        case 0: showAd_id0(); break;
        case 1: showAd_id1(); break;
        case 2: showAd_id2(); break;
        case 3: showAd_id3(); break;
        case 4: showAd_id4(); break;
    }
}




			// ৪ মিনিটের জন্য টাইমার ফাংশন

			const duration = 4 * 60 * 1000; // ৪ মিনিট মিলিসেকেন্ডে
			const expiryTime = Date.now() + duration;
			localStorage.setItem('ads_gap_timer', expiryTime);
			}


			function triggerAdNetworkRequest() {
			start5MinuteTimer();
			}








			// ==========================================

			// ==========================================

			let dynamicRecentWordsHistory = [];

			const BALANCE_STORAGE_KEY = 'spelling_game_balance';

			// 🔥 300 PREMIUM ENGLISH WORDS

			window.onload = function() {
			// ১. লোকাল মেমরি থেকে ইউনিক কি দিয়ে ব্যালেন্স লোড

			} else {
			pointsBalance = 0;

			document.getElementById('user-points').innerText = pointsBalance.toLocaleString();

			// ২. পেজ ফ্রেশ লোড হলে টাইমার সবসময় রিসেট ও অফ থাকবে
			is2xActive = false;
			updateUIState();

			generateWordFromSecureMemoryBank();
			};

			// ==========================================
			// ৫ মিনিটের ফিক্সড কাউন্টডাউন টাইমার ইঞ্জিন
			// ==========================================
			function start5MinuteTimer() {
			is2xActive = true;
			remainingTime = 300; // ফিক্সড ৩০০ সেকেন্ড

			if (countdownIntervalId !== null) clearInterval(countdownIntervalId);

			updateUIState();

			countdownIntervalId = setInterval(() => {
			remainingTime--;
			updateUIState();

			if (remainingTime <= 0) {
			clearInterval(countdownIntervalId);
			is2xActive = false;
			updateUIState(); // ৫ মিনিট শেষ হলে বাটন ফিরিয়ে আনবে ও টাইমার হাইড করবে
			}
			}, 1000);
			}

			// ==========================================
			// টাইমার ও বাটনের দৃশ্যমানতা কন্ট্রোল ফাংশন
			// ==========================================
			function updateUIState() {
			let adButton = document.getElementById('watch-ad-button');
			let timerBox = document.getElementById('premium-countdown-timer');
			let timerText = document.getElementById('timer-display-text');

			if (is2xActive && remainingTime > 0) {
			// টাইমার একটিভ থাকলে: এড বাটন গায়েব, টাইমার বক্স ভিজিবল
			adButton.style.display = "none";
			timerBox.style.display = "block";

			let minutes = Math.floor(remainingTime / 60);
			let seconds = remainingTime % 60;
			seconds = seconds < 10 ? '0' + seconds : seconds;
			timerText.innerHTML = `<i class="fa-solid fa-fire"></i> 2x Boost Active: ${minutes}:${seconds}`;
			} else {
			// টাইমার অফ বা শেষ হলে: এড বাটন দৃশ্যমান, টাইমার বক্স গায়েব
			adButton.style.display = "flex";
			timerBox.style.display = "none";
			}
			}

			function generateWordFromSecureMemoryBank() {
			document.getElementById('main-word-box').innerText = "Loading Word...";
			document.getElementById('clues-container').innerHTML = "";
			systemLock = true;

			let targetedWord = "";
			let retrySafetyCounter = 0;

			while (retrySafetyCounter < 150) {
					const randomIndex = Math.floor(Math.random() * globalPremiumDictionary.length);
					let temporaryWord = globalPremiumDictionary[randomIndex].toUpperCase().replace(/[^A-Z]/g, "");

					if (temporaryWord.length >= 7 && temporaryWord.length <= 12) {
			if (!dynamicRecentWordsHistory.includes(temporaryWord)) {
			targetedWord = temporaryWord;
			break;
			}
			}
			retrySafetyCounter++;
			}

			if (!targetedWord) {
			targetedWord = "DEVELOPER";
			}

			dynamicRecentWordsHistory.push(targetedWord);
			if (dynamicRecentWordsHistory.length > maximumHistoryLength) {
			dynamicRecentWordsHistory.shift();
			}

			processDictionaryWordSetup(targetedWord);
			}

			function processDictionaryWordSetup(targetWord) {
			activeFullWord = targetWord;

			const maxCutIndex = activeFullWord.length - 2;
			const cutIndex = Math.floor(Math.random() * (maxCutIndex + 1));

			correctCluePair = activeFullWord.substr(cutIndex, 2);
			activeBlanksPattern = activeFullWord.substring(0, cutIndex) + "_ _" + activeFullWord.substring(cutIndex + 2);

			document.getElementById('main-word-box').innerText = activeBlanksPattern;

			let finalOptionsArray = [null, null, null, null];
			const randomCorrectPosition = Math.floor(Math.random() * 4);
			finalOptionsArray[randomCorrectPosition] = correctCluePair;

			const alphabets = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
			for (let i = 0; i < 4; i++) {
					if (finalOptionsArray[i] === null) {
						let fakeClue = "";
						while (true) {
							if (Math.random() > 0.5) {
								let randomChar = alphabets[Math.floor(Math.random() * alphabets.length)];
								fakeClue = correctCluePair[0] + randomChar;
							} else {
								let randomChar = alphabets[Math.floor(Math.random() * alphabets.length)];
								fakeClue = randomChar + correctCluePair[1];
							}
							
							if (fakeClue !== correctCluePair && !finalOptionsArray.includes(fakeClue)) {
			finalOptionsArray[i] = fakeClue;
			break;
			}
			}
			}
			}

			const cluesContainer = document.getElementById('clues-container');
			cluesContainer.innerHTML = "";
			cluesContainer.classList.remove('disabled-click');

			finalOptionsArray.forEach(clueString => {
			const boxElement = document.createElement('div');
			boxElement.className = 'clue-option-box';
			boxElement.innerText = clueString;
			boxElement.onclick = function() { handleClueSelection(this, clueString); };
			cluesContainer.appendChild(boxElement);
			});

			document.getElementById('skip-action-btn').disabled = false;
			systemLock = false;
			}

			/**
			* User Choice Evaluation & Instant Storage Sync
				*/
				function handleClueSelection(selectedBoxElement, chosenString) {
				if (systemLock) return;
				systemLock = true;

				const wordDisplayBox = document.getElementById('main-word-box');
				const cluesContainer = document.getElementById('clues-container');
				const skipButton = document.getElementById('skip-action-btn');

				cluesContainer.classList.add('disabled-click');
				skipButton.disabled = true;

				if (chosenString === correctCluePair) {
				selectedBoxElement.classList.add('correct-choice');
				wordDisplayBox.classList.add('correct-state');
				wordDisplayBox.innerText = activeFullWord;

				// কন্ডিশনাল রিওয়ার্ড ক্যালকুলেশন (বুস্ট থাকলে ৪, না থাকলে ২)
				let coinsToEarn = is2xActive ? 4 : 2;

				pointsBalance += coinsToEarn;
				document.getElementById('user-points').innerText = pointsBalance.toLocaleString();

				// ইনস্ট্যান্ট লোকাল মেমরি আপডেট
				localStorage.setItem(BALANCE_STORAGE_KEY, pointsBalance);

				setTimeout(() => {
				wordDisplayBox.classList.remove('correct-state');
				generateWordFromSecureMemoryBank();
				}, 2000);

				} else {
				selectedBoxElement.classList.add('wrong-choice');
				wordDisplayBox.classList.add('wrong-state');

				setTimeout(() => {
				selectedBoxElement.classList.remove('wrong-choice');
				wordDisplayBox.classList.remove('wrong-state');
				cluesContainer.classList.remove('disabled-click');
				skipButton.disabled = false;
				systemLock = false;
				}, 1500);
				}
				}

				function skipCurrentWord() {
				if (systemLock) return;
				document.getElementById('skip-action-btn').disabled = true;
				generateWordFromSecureMemoryBank();
				}

				async function triggerClaimReward() {
				// ১. ব্যালেন্স চেক (এখানে আপনার আগের কি (key) ব্যবহার করুন)
				const currentBalance = parseInt(localStorage.getItem(BALANCE_STORAGE_KEY)) || 0;

				if (currentBalance < 10) { 
        showCustomPopup("Minimum 1000 points required to claim. Keep playing to collect more points!");
        return; 
    }

    // ২. Telegram WebApp থেকে সরাসরি UserID নেওয়া
    const userid = window.Telegram?.WebApp?.initDataUnsafe?.user?.id;

    if (!userid) {
        showCustomPopup("Authentication failed. Please open via Telegram.");
        return;
    }

    try {
        const userRef = ref(db, 'users/' + userid);
        const snapshot = await get(userRef);
        
        if (snapshot.exists()) {
            const userData = snapshot.val();
            
            // ৩. ইউজারের নিজের ব্যালেন্স আপডেট
            await update(userRef, { 
                bal: increment(currentBalance) 
            });

            // ৪. যদি রেফারার (referrer) থাকে, তাকে ১০% কমিশন দেওয়া
            if (userData.rid && userData.rid !== "none") {
					const commission = currentBalance * 0.10; // ১০% কমিশন
					const referrerRef = ref(db, 'users/' + userData.rid);

					await update(referrerRef, {
					bal: increment(commission),
					comm: increment(commission) // কমিশন ট্র্যাক করার জন্য
					});
					console.log("Commission sent to referrer:", userData.rid);
					}
					} else {
					// যদি ইউজার ডাটাবেসে না থাকে, শুধু নিজের ব্যালেন্স আপডেট
					await update(userRef, { bal: increment(currentBalance) });
					}

					// ৫. সফলভাবে আপডেট হওয়ার পর রিসেট
					pointsBalance = 0;
					localStorage.setItem(BALANCE_STORAGE_KEY, 0);
					document.getElementById('user-points').innerText = "0";
					showCustomPopup("Claim Successful!");

					} catch (error) {
					console.error("Firebase Update Error:", error);
					showCustomPopup("Something went wrong. Please try again.");
					}
					}
