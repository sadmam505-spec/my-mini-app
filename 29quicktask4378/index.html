<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
				<title>Task Hub</title>
				<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
				<style>
					@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

					body {
					margin: 0; background: #0a0a0a; color: #fff;
					font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; min-height: 100vh;
					}

					.mobile-frame {
					width: 100%; max-width: 450px; background: #0a0a0a;
					position: relative; border-left: 1px solid #1a1a1a; border-right: 1px solid #1a1a1a;
					padding: 24px; box-sizing: border-box; overflow-y: auto;
					}

					h2 { font-size: 24px; font-weight: 800; margin-bottom: 30px; background: linear-gradient(90deg, #fff, #a1a1a1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

					.task-card {
					background: linear-gradient(160deg, #151515 0%, #0a0a0a 100%);
					border: 1px solid #222; padding: 20px; border-radius: 24px;
					margin-bottom: 20px; position: relative; overflow: hidden;
					transition: all 0.3s ease;
					}

					.task-card:hover { border-color: #4ade80; box-shadow: 0 0 20px rgba(74, 222, 128, 0.1); }

					.badge {
					background: rgba(74, 222, 128, 0.1); color: #4ade80;
					padding: 4px 10px; border-radius: 8px; font-size: 10px;
					font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
					}

					.task-info h3 { margin: 12px 0 4px 0; font-size: 18px; font-weight: 700; }
					.task-info p { font-size: 13px; color: #888; margin-bottom: 15px; }

					.task-btn {
					background: #fff; color: #000; padding: 12px; text-align: center;
					border-radius: 14px; font-weight: 800; text-decoration: none; display: block;
					font-size: 13px; transition: transform 0.2s;
					}
					.task-btn:active { transform: scale(0.97); }

					/* Adsgram specific */
					adsgram-task { display: block; width: 100%; border-radius: 14px; }
				</style>
			</head>
	<body>

		<div class="mobile-frame">
			<h2>Quick Tasks</h2>

			<div class="task-card">
				<span class="badge">Trending</span>
				<div class="task-info">
					<h3>Video Missions</h3>
					<p>Complete rewarded video tasks for instant coins.</p>
				</div>
				<adsgram-task data-block-id='task-32179'></adsgram-task>
			</div>

			<div class="task-card">
				<span class="badge" style="color:#f39c12; background:rgba(243, 156, 18, 0.1)">High Payout</span>
				<div class="task-info">
					<h3>Offerwall Studio</h3>
					<p>Unlock high-reward apps and complex surveys.</p>
				</div>
				<a href="YOUR_GIGAPUB_LINK" class="task-btn">Open Offerwall</a>
			</div>

			<div class="task-card">
				<span class="badge" style="color:#3498db; background:rgba(52, 152, 219, 0.1)">Daily Task</span>
				<div class="task-info">
					<h3>Smart Link Hub</h3>
					<p>Simple clicks that yield quick rewards daily.</p>
				</div>
				<a href="YOUR_MONETAG_LINK" class="task-btn">Get Started</a>
			</div>
		</div>

	</body>
</html>
