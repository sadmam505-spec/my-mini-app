<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<title>3D Lucky Roller - Premium</title>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
		<style>

			html, body {
			-webkit-tap-highlight-color: transparent !important;
			}
			* { box-sizing: border-box; }

			body {
			background-color: #000;
			color: #fff;
			font-family: 'Inter', sans-serif;
			margin: 0;
			padding: 0;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			overflow: hidden;
			}

			.phone-container {
			width: 100%;
			height: 100%;
			max-width: 400px;
			background-color: #000;
			border: 2px solid #333;
			border-radius: 30px;
			overflow-y: auto;
			display: flex;
			flex-direction: column;
			box-shadow: 0 10px 30px rgba(0,0,0,0.5);
			padding: 24px 18px;
			}

			.phone-container::-webkit-scrollbar {
			width: 0px;
			}

			/* ==========================================================================
			1. TOP SECTION (Balance & Claim Bar)
			========================================================================== */
			.stats-container {
			width: 100%;
			background: #111;
			border: 1px solid #333;
			border-radius: 15px;
			padding: 12px 15px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 25px;
			}

			.point-box { color: #f39c12; font-weight: bold; }

			.claim-btn {
			background: #27ae60;
			color: white;
			border: none;
			padding: 8px 15px;
			border-radius: 20px;
			font-size: 0.8rem;
			font-weight: bold;
			cursor: pointer;
			transition: transform 0.1s;
			}
			.claim-btn:active { transform: scale(0.9); }

			/* ==========================================================================
			2. MIDDLE SECTION (Game Rules & Badges) - PREMIUM SKY BLUE THEME
			========================================================================== */
			.game-rules {
			width: 100%;
			text-align: center;
			margin-bottom: 30px;
			padding: 0 10px;
			display: flex;
			flex-direction: column;
			gap: 10px;
			}

			.game-rules-box {
			background: rgba(0, 180, 216, 0.1);
			border: 1px dashed #00b4d8;
			border-radius: 8px;
			padding: 10px 12px;
			display: inline-block;
			align-self: center;
			width: 100%;
			box-shadow: 0 0 15px rgba(0, 180, 216, 0.1);
			}

			.game-rules-text {
			color: #00b4d8;
			font-size: 0.9rem;
			margin: 0;
			font-weight: bold;
			letter-spacing: 0.5px;
			text-transform: uppercase;
			text-shadow: 0 0 8px rgba(0, 180, 216, 0.2);
			}

			/* ==========================================================================
			3. NEW PREMIUM AD BUTTON & COUNTDOWN BOX (SPELLING PAGE STYLE)
			========================================================================== */
			.premium-ad-trigger-btn {
			width: 100%;
			padding: 14px 20px;
			background: linear-gradient(135deg, #f3ba2f 0%, #f1a80a 100%);
			color: #000000;
			border: none;
			border-radius: 15px;
			font-size: 14px;
			font-weight: 700;
			letter-spacing: 0.5px;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 10px;
			box-shadow: 0 0 20px rgba(243, 186, 47, 0.4);
			animation: intenseGlowingEffect 2s infinite alternate;
			transition: transform 0.1s ease;
			margin-bottom: 15px;
			}

			.premium-ad-trigger-btn:active {
			transform: scale(0.96);
			}

			@keyframes intenseGlowingEffect {
			0% { box-shadow: 0 0 12px rgba(243, 186, 47, 0.3); }
			100% { box-shadow: 0 0 24px rgba(243, 186, 47, 0.65); }
			}

			.premium-red-timer-box {
			width: 100%;
			background: rgba(255, 76, 76, 0.05);
			border: 1px dashed rgba(255, 76, 76, 0.35);
			border-radius: 12px;
			padding: 11px;
			text-align: center;
			display: none;
			box-shadow: 0 0 15px rgba(255, 76, 76, 0.1);
			animation: timerPulse 2s infinite alternate;
			margin-bottom: 15px;
			}

			.premium-red-timer-box span {
			font-size: 13px;
			font-weight: 700;
			letter-spacing: 0.8px;
			color: #ff4c4c;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 6px;
			}

			@keyframes timerPulse {
			0% { border-color: rgba(255, 76, 76, 0.35); box-shadow: 0 0 10px rgba(255, 76, 76, 0.1); }
			100% { border-color: rgba(255, 76, 76, 0.7); box-shadow: 0 0 20px rgba(255, 76, 76, 0.25); }
			}

			/* ==========================================================================
			4. GAME PLAY AREA (3D Dice Stage)
			========================================================================== */
			.game-area {
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			width: 100%;
			perspective: 1200px;
			padding: 40px 0;
			background: rgba(255, 255, 255, 0.02);
			border-radius: 24px;
			border: 1px solid rgba(255, 255, 255, 0.03);
			}

			.dice-wrapper {
			display: flex;
			gap: 40px;
			height: 80px;
			align-items: center;
			}

			.dice-container {
			width: 60px;
			height: 60px;
			position: relative;
			transform-style: preserve-3d;
			transition: transform 1.5s cubic-bezier(0.1, 0.5, 0.3, 1);
			}

			.initial-pos { transform: translateY(-500px) rotateX(45deg) rotateY(45deg); }

			.face {
			position: absolute;
			width: 60px;
			height: 60px;
			background: #fff;
			border: 1px solid #ddd;
			border-radius: 10px;
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			grid-template-rows: repeat(3, 1fr);
			padding: 6px;
			box-shadow: inset 0 0 10px rgba(0,0,0,0.15);
			backface-visibility: hidden;
			}

			.dot { width: 10px; height: 10px; background: #000; border-radius: 50%; justify-self: center; align-self: center; }

			.front  { transform: rotateY(0deg) translateZ(30px); }
			.back   { transform: rotateY(180deg) translateZ(30px); }
			.right  { transform: rotateY(90deg) translateZ(30px); }
			.left   { transform: rotateY(-90deg) translateZ(30px); }
			.top    { transform: rotateX(90deg) translateZ(30px); }
			.bottom { transform: rotateX(-90deg) translateZ(30px); }

			.rolling-fast {
			animation: fastSpin 0.3s infinite linear;
			}

			@keyframes fastSpin {
			0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
			100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
			}

			#status {
			font-size: 1.1rem;
			margin-top: 25px;
			font-weight: 700;
			letter-spacing: 0.5px;
			min-height: 24px;
			}
			.status-green { color: #2ec4b6; text-shadow: 0 0 10px rgba(46, 196, 178, 0.2); }
			.status-red { color: #e74c3c; text-shadow: 0 0 10px rgba(231, 76, 60, 0.2); }
			.status-normal { color: #888; font-weight: 500; font-size: 0.9rem; }

			/* ==========================================================================
			5. CONTROLS SECTION
			========================================================================== */
			.controls {
			width: 100%;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 16px;
			background: transparent;
			margin-top: 35px;
			padding-bottom: 15px;
			}

			.roll-action-row {
			width: 100%;
			display: flex;
			justify-content: center;
			align-items: center;
			position: relative;
			}

			.roll-btn {
			background: linear-gradient(45deg, #f39c12, #e67e22);
			color: white;
			border: none;
			padding: 15px 50px;
			font-size: 1.1rem;
			border-radius: 30px;
			font-weight: bold;
			cursor: pointer;
			transition: transform 0.1s;
			min-width: 220px;
			box-shadow: 0 4px 15px rgba(230, 126, 34, 0.3);
			}
			.roll-btn:active { transform: scale(0.95); }
			.roll-btn:disabled { background: #333; cursor: not-allowed; box-shadow: none; color: #666; }
		</style>
	</head>
	<body>

		<div class="phone-container">

			<div class="stats-container">
				<a href="https://dashboard.gritorax.com" id="dashboard-link" style="color: #f39c12; font-size: 1.2rem; text-decoration: none; display: flex; align-items: center; width: 40px;">
					<i class="fa-solid fa-house"></i>
				</a>
				<div class="point-box" style="flex: 1; display: flex; justify-content: center; align-items: center; gap: 6px; font-size: 1.1rem;">
					<i class="fa-solid fa-coins"></i>
					<span id="user-points-display">0</span>
				</div>
				<button class="claim-btn" id="claimRewardBtn" onclick="executeClaimSequence()">
					Claim
				</button>
			</div>

			<div class="game-rules">
				<div class="game-rules-box">
					<p class="game-rules-text">
						Roll double 6 for 10 coins
					</p>
				</div>
			</div>

			<button class="premium-ad-trigger-btn" id="watch-ad-button" onclick="triggerPremiumAdNetwork()">
				<i class="fa-solid fa-circle-play"></i> Watch Video Ads to Get 2x Coins
			</button>

			<div class="premium-red-timer-box" id="premium-countdown-box">
				<span id="timer-display-text">
					<i class="fa-solid fa-fire"></i> 2x Boost Active: 5:00
				</span>
			</div>

			<div class="game-area">
				<div id="drop-zone" style="transition: transform 1s;">
					<div class="dice-wrapper">
						<div id="dice1" class="dice-container initial-pos">
							<div class="face front"></div>
							<div class="face back"></div>
							<div class="face right"></div>
							<div class="face left"></div>
							<div class="face top"></div>
							<div class="face bottom"></div>
						</div>
						<div id="dice2" class="dice-container initial-pos">
							<div class="face front"></div>
							<div class="face back"></div>
							<div class="face right"></div>
							<div class="face left"></div>
							<div class="face top"></div>
							<div class="face bottom"></div>
						</div>
					</div>
				</div>
				<p id="status" class="status-normal">Feeling lucky? Roll the dice!</p>
			</div>

			<div class="controls">
				<div class="roll-action-row">
					<button class="roll-btn" onclick="startRoll()">ROLL DICE</button>
				</div>
			</div>

		</div>

		<script>
			let is2xActive = false;
			let remainingTime = 0;
			let countdownIntervalId = null;
			let diceGameBalance = 0;
			const DICE_STORAGE_KEY = 'dice_game_balance';

			function getDotsHTML(num) {
			const positions = {
			1: [5],
			2: [1, 9],
			3: [1, 5, 9],
			4: [1, 3, 7, 9],
			5: [1, 3, 5, 7, 9],
			6: [1, 3, 4, 6, 7, 9]
			};
			let html = '';
			for (let i = 1; i <= 9; i++) {
			if (positions[num].includes(i)) html += `<div class="dot" style="grid-area: ${Math.ceil(i/3)}/${(i-1)%3+1}"></div>`;
			}
			return html;
			}

			function shuffleDiceFaces(diceId) {
			const faces = ['front', 'back', 'right', 'left', 'top', 'bottom'];
			const dice = document.getElementById(diceId);
			faces.forEach(faceClass => {
			const randomNum = Math.floor(Math.random() * 6) + 1;
			dice.querySelector('.' + faceClass).innerHTML = getDotsHTML(randomNum);
			});
			}

			function getWeightedResult() {
			const seed = Math.floor(Math.random() * 100) + 1;

			if (seed === 100) {
			return [6, 6];
			}

			if (seed >= 1 && seed <= 30) {
			const allowedSameValues = [1, 2, 3, 4, 5];
			const pickValue = allowedSameValues[Math.floor(Math.random() * allowedSameValues.length)];
			return [pickValue, pickValue];
			}

			if (seed >= 70 && seed <= 99) {
			const evenPool = [2, 4, 6];
			const firstEven = evenPool[Math.floor(Math.random() * evenPool.length)];
			const remainingEvens = evenPool.filter(val => val !== firstEven);
			const secondEven = remainingEvens[Math.floor(Math.random() * remainingEvens.length)];
			return [firstEven, secondEven];
			}

			const odds = [1, 3, 5];
			const evens = [2, 4, 6];
			const randomOdd = odds[Math.floor(Math.random() * odds.length)];
			const randomEven = evens[Math.floor(Math.random() * evens.length)];

			if (Math.random() > 0.5) {
			return [randomEven, randomOdd];
			} else {
			return [randomOdd, randomEven];
			}
			}

			function start5MinuteTimer() {
			is2xActive = true;
			remainingTime = 300;

			if (countdownIntervalId !== null) clearInterval(countdownIntervalId);
			updateUIState();

			countdownIntervalId = setInterval(() => {
			remainingTime--;
			updateUIState();

			if (remainingTime <= 0) {
			clearInterval(countdownIntervalId);
			is2xActive = false;
			updateUIState();
			}
			}, 1000);
			}

			function updateUIState() {
			let adButton = document.getElementById('watch-ad-button');
			let timerBox = document.getElementById('premium-countdown-box');
			let timerText = document.getElementById('timer-display-text');

			if (is2xActive && remainingTime > 0) {
			adButton.style.display = "none";
			timerBox.style.display = "block";

			let minutes = Math.floor(remainingTime / 60);
			let seconds = remainingTime % 60;
			seconds = seconds < 10 ? '0' + seconds : seconds;
					timerText.innerHTML = `<i class="fa-solid fa-fire"></i> 2x Boost Active: ${minutes}:${seconds}`;
			} else {
			adButton.style.display = "flex";
			timerBox.style.display = "none";
			}
			}

			function startRoll() {
			const d1 = document.getElementById('dice1');
			const d2 = document.getElementById('dice2');
			const btn = document.querySelector('.roll-btn');
			const status = document.getElementById('status');

			btn.disabled = true;
			status.innerText = "Rolling...";
			status.className = "status-normal";

			const shuffleInterval = setInterval(() => {
			shuffleDiceFaces('dice1');
			shuffleDiceFaces('dice2');
			}, 100);

			d1.style.transition = "none";
			d2.style.transition = "none";
			d1.className = "dice-container rolling-fast";
			d2.className = "dice-container rolling-fast";

			setTimeout(() => {
			clearInterval(shuffleInterval);
			const [res1, res2] = getWeightedResult();

			d1.querySelector('.front').innerHTML = getDotsHTML(res1);
			d2.querySelector('.front').innerHTML = getDotsHTML(res2);

			d1.className = "dice-container";
			d2.className = "dice-container";
			d1.style.transition = "transform 1s cubic-bezier(0.17, 0.67, 0.83, 0.67)";
			d2.style.transition = "transform 1s cubic-bezier(0.17, 0.67, 0.83, 0.67)";

			d1.style.transform = "translateY(0) rotateX(0deg) rotateY(0deg)";
			d2.style.transform = "translateY(0) rotateX(0deg) rotateY(0deg)";

			processGameReward(res1, res2);

			btn.disabled = false;
			}, 3000);
			}

			function processGameReward(r1, r2) {
			const status = document.getElementById('status');
			let calculatedCoins = 0;
			let isWin = false;

			if (r1 === 6 && r2 === 6) {
			calculatedCoins = 10;
			isWin = true;
			} else if (r1 === r2) {
			calculatedCoins = 2;
			isWin = true;
			} else if (r1 % 2 === 0 && r2 % 2 === 0) {
			calculatedCoins = 1;
			isWin = true;
			} else {
			calculatedCoins = 0;
			isWin = false;
			}

			if (isWin) {
			let finalAppliedReward = is2xActive ? (calculatedCoins * 2) : calculatedCoins;

			diceGameBalance += finalAppliedReward;
			document.getElementById('user-points-display').innerText = diceGameBalance;

			localStorage.setItem(DICE_STORAGE_KEY, diceGameBalance);

			status.innerText = `+${finalAppliedReward} Coins Added!`;
			status.className = "status-green";
			} else {
			status.innerText = "Oops! Try Again 😥";
			status.className = "status-red";
			}

			setTimeout(() => {
			status.innerText = "";
			status.className = "status-normal";
			}, 2000);
			}

			window.onload = () => {
			const d1 = document.getElementById('dice1');
			const d2 = document.getElementById('dice2');

			if (localStorage.getItem(DICE_STORAGE_KEY)) {
			diceGameBalance = parseInt(localStorage.getItem(DICE_STORAGE_KEY));
			} else {
			diceGameBalance = 0;
			}
			document.getElementById('user-points-display').innerText = diceGameBalance;

			is2xActive = false;
			updateUIState();

			if(d1 && d2) {
			d1.querySelector('.front').innerHTML = getDotsHTML(6);
			d2.querySelector('.front').innerHTML = getDotsHTML(6);

			d1.className = "dice-container";
			d2.className = "dice-container";
			d1.style.transform = "translateY(0) rotateX(0deg) rotateY(0deg)";
			d2.style.transform = "translateY(0) rotateX(0deg) rotateY(0deg)";

			shuffleDiceFaces('dice1');
			shuffleDiceFaces('dice2');

			d1.querySelector('.front').innerHTML = getDotsHTML(6);
			d2.querySelector('.front').innerHTML = getDotsHTML(6);
			}
			};

			function triggerPremiumAdNetwork() {
			console.log("Dice ad network activated.");
			start5MinuteTimer();
			}

			function executeClaimSequence() {
			if (diceGameBalance <= 0) {
			alert("আপনার ক্লেইম করার মতো কোনো কয়েন নেই!");
			return;
			}
			diceGameBalance = 0;
			localStorage.setItem(DICE_STORAGE_KEY, diceGameBalance);
			document.getElementById('user-points-display').innerText = "0";
			alert("কয়েন সফলভাবে আপনার মূল ওয়ালেটে ট্রান্সফার করা হয়েছে!");
			}

			history.pushState(null, null, window.location.href);
			window.addEventListener('popstate', function(event) {
			window.location.href = "https://dashboard.gritorax.com";
			});

			document.getElementById('dashboard-link').addEventListener('click', function(e) {
			window.location.href = "https://dashboard.gritorax.com";
			});
		</script>
	</body>
</html>
