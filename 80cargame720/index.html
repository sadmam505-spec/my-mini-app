<html lang="en">
	<head>
		<meta charset="UTF-8">

				<style>
					/* এটি সব বাটন এবং ক্লিকযোগ্য এলিমেন্টের হাইলাইট কালার বন্ধ করবে */
					button, div {
					-webkit-tap-highlight-color: transparent;
					-webkit-tap-highlight-color: rgba(0, 0, 0, 0);
					outline: none;
					}

					body { margin: 0; background: #1a1a1a; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: sans-serif; }
					#gameContainer { width: 100%; max-width: 400px; height: 100%; display: flex; flex-direction: column; background: #281F1F; position: relative; border: 2px solid #000; }

					/* Header */
					#header { height: 60px; background: #000; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; color: #fff; }
					.bal-section { font-size: 14px; }
					.collect-btn { background: #2ecc71; border: 2px solid #27ae60; padding: 6px 15px; color: white; border-radius: 20px; cursor: pointer; }
					.collect-btn:active { transform: scale(0.95); }

					/* Reward Section - NEW STYLES FROM DICE GAME */
					#rewardSection {
					padding: 10px 15px;
					background: #281F1F;
					display: flex;
					flex-direction: column;
					justify-content: center;
					align-items: center;
					}

					.premium-ad-trigger-btn {
					width: 100%;
					padding: 12px 20px;
					background: linear-gradient(135deg, #f3ba2f 0%, #f1a80a 100%);

					border: none;
					border-radius: 15px;
					font-size: 13px;
					font-weight: 700;
					letter-spacing: 0.5px;
					cursor: pointer;
					display: flex;
					align-items: center;
					justify-content: center;
					gap: 10px;
					box-shadow: 0 0 20px rgba(243, 186, 47, 0.4);
					animation: intenseGlowingEffect 2s infinite alternate;
					transition: transform 0.1s ease;
					text-transform: uppercase;
					}

					.premium-ad-trigger-btn:active {
					transform: scale(0.96);
					}

					@keyframes intenseGlowingEffect {
					0% { box-shadow: 0 0 12px rgba(243, 186, 47, 0.3); }
					100% { box-shadow: 0 0 24px rgba(243, 186, 47, 0.65); }
					}

					.premium-red-timer-box {
					width: 100%;
					background: rgba(255, 76, 76, 0.05);
					border: 1px dashed rgba(255, 76, 76, 0.35);
					border-radius: 12px;
					padding: 10px;
					text-align: center;
					display: none;
					box-shadow: 0 0 15px rgba(255, 76, 76, 0.1);
					animation: timerPulse 2s infinite alternate;
					}

					.premium-red-timer-box span {
					font-size: 13px;
					font-weight: 700;
					letter-spacing: 0.8px;
					color: #ff4c4c;
					display: flex;
					align-items: center;
					justify-content: center;

					}

					@keyframes timerPulse {
					0% { border-color: rgba(255, 76, 76, 0.35); box-shadow: 0 0 10px rgba(255, 76, 76, 0.1); }
					100% { border-color: rgba(255, 76, 76, 0.7); box-shadow: 0 0 20px rgba(255, 76, 76, 0.25); }
					}

					/* Game Area */
					#gameArea { flex: 0.90; position: relative; overflow: hidden; background: #281F1F; touch-action: none; }
					#liveScore { position: absolute; top: 10px; left: 15px; color: white; font-size: 18px; font-weight: bold; z-index: 10; }
					.road-line { position: absolute; width: 6px; height: 55px; background: rgba(255,255,255,0.3); left: 50%; animation: moveLines 1s linear infinite; }
					@keyframes moveLines { from { top: -100px; } to { top: 100%; } }

					.obj { width: 50px; height: 80px; position: absolute; background-size: contain; background-repeat: no-repeat; transition: left 0.05s; }
					#userCar { background-image: url('user.png'); bottom: 20px; left: 160px; z-index: 10; }
					.enemy { background-image: url('enime.png'); }
					.reward {
					background-image: url('reward.png');
					filter: drop-shadow(0 0 10px rgba(241, 196, 15, 0.8))
					drop-shadow(0 0 20px rgba(241, 196, 15, 0.6));
					animation: rewardPulse 1.5s infinite alternate;
					}

					@keyframes rewardPulse {
					from {
					filter: drop-shadow(0 0 5px rgba(241, 196, 15, 0.5));
					}
					to {
					filter: drop-shadow(0 0 15px rgba(241, 196, 15, 1))
					drop-shadow(0 0 25px rgba(241, 196, 15, 0.8));
					}
					}

					.plusOne { position: absolute; color: #2ecc71; font-size: 24px; font-weight: bold; z-index: 20; animation: floatUp 1s ease-out forwards; }
					@keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }

					/* Controls */
					.controls { height: 60px; display: flex; background: #000; padding-bottom: env(safe-area-inset-bottom); padding-top: 0.5px; }
					.controls button { flex: 1; background: #005411; border: 1.5px solid #000000; color: #25B02E; font-size: 30px; }
					.controls button:active { background: #097310; }

					#startBtn {
					padding: 20px 50px;
					background: linear-gradient(135deg, #2ecc71, #27ae60);
					color: white;
					font-size: 15px;
					font-weight: 900;
					text-transform: uppercase;
					letter-spacing: 2px;
					border: none;
					border-radius: 50px;
					cursor: pointer;
					box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 15px #2ecc71;
					transition: all 0.3s ease;
					text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
					}

					#startBtn:hover {
					transform: scale(1.05);
					box-shadow: 0 0 30px #2ecc71;
					}

					/* Popups */
					#gameOverPopup, #startScreen, #messagePopup { display: flex; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; z-index: 200; color: white; }

					#gameOverPopup {
					display: none;
					position: absolute;
					top: 0;
					left: 0;
					width: 100%;
					height: 100%;
					background: rgba(0, 0, 0, 0.9);
					flex-direction: column;
					justify-content: center;
					align-items: center;
					z-index: 200;
					color: white;
					}

					#gameOverPopup .game-over-card {
					background: linear-gradient(135deg, #2c3e50, #000000);
					border: 4px solid #e74c3c;
					border-radius: 20px;
					padding: 30px;
					text-align: center;
					box-shadow: 0 0 30px rgba(231, 76, 60, 0.5);
					max-width: 80%;
					}

					#gameOverPopup h2 {
					font-size: 32px;
					font-weight: 900;
					margin-top: 0;
					margin-bottom: 10px;
					color: #e74c3c;
					text-transform: uppercase;
					text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
					}

					#gameOverPopup .final-score {
					font-size: 24px;
					font-weight: bold;
					color: #f1c40f;
					margin-bottom: 20px;
					text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
					}

					#gameOverPopup .play-again-btn {
					padding: 15px 40px;
					background: linear-gradient(135deg, #e74c3c, #c0392b);
					color: white;
					font-size: 20px;
					font-weight: bold;
					text-transform: uppercase;
					border: none;
					border-radius: 50px;
					cursor: pointer;
					box-shadow: 0 5px 15px rgba(0,0,0,0.5), 0 0 10px #e74c3c;
					transition: all 0.3s ease;
					text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
					}

					#gameOverPopup .play-again-btn:hover {
					transform: scale(1.05);
					box-shadow: 0 0 20px #e74c3c;
					}

					.home-icon-btn {
					background: rgba(255, 255, 255, 0.1);
					border: 1.5px solid rgba(255, 255, 255, 0.2);
					color: #ffffff;
					width: 38px;
					height: 38px;
					border-radius: 50%;
					display: flex;
					justify-content: center;
					align-items: center;
					cursor: pointer;
					transition: all 0.2s;
					font-size: 16px;
					box-shadow: 0 4px 10px rgba(0,0,0,0.3);
					}

					.home-icon-btn:active {
					transform: scale(0.9);
					background: rgba(74, 222, 128, 0.3);
					color: #4ade80;
					border-color: #4ade80;
					}

				</style>
			</head>
	<body>
		<div id="gameContainer">
			<div id="header">
				<div class="home-icon-btn" onclick="goToDashboard()">
					<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
						<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
						<polyline points="9 22 9 12 15 12 15 22"></polyline>
					</svg>
				</div>
				<div class="bal-section">
					Balance: <span id="mainBalance">0</span>
				</div>
				<button class="collect-btn" onclick="collectPoints()">Collect</button>
			</div>

			<div id="rewardSection">
				<button class="premium-ad-trigger-btn" id="watch-ad-button" onclick="tryNextAd()">
					<i class="fa-solid fa-circle-play"></i> Watch Ad for 2x Coins Boost
				</button>
				<div class="premium-red-timer-box" id="premium-countdown-box">
					<span id="timer-display-text">2x Boost Active: 5:00</span>
				</div>
			</div>

			<div id="gameArea">
				<div id="liveScore">Score: 0</div>

				<div class="road-line" style="left: 20%;"></div>
				<div class="road-line" style="left: 20%;"></div>
				<div class="road-line" style="left: 80%;"></div>
				<div id="userCar" class="obj"></div>
				<div id="startScreen">
					<button id="startBtn">START GAME</button>
				</div>
				<div id="gameOverPopup" style="display:none;">
					<div class="game-over-card">
						<h2>GAME OVER</h2>
						<p class="final-score">
							Score: <span id="finalScoreDisplay">0</span>
						</p>
						<button class="play-again-btn" onclick="restartGame()">PLAY AGAIN</button>
					</div>
				</div>
				<div id="messagePopup" style="display:none;">
					<p style="text-align:center; padding:20px;">Minimum 1000 points required to claim. Keep playing to collect more points!</p>
					<button onclick="document.getElementById('messagePopup').style.display='none'">OK</button>
				</div>
			</div>
			<div class="controls">
				<button id="leftBtn">◀</button>
				<button id="rightBtn">▶</button>
			</div>
		</div>

		<div id="ad-popup" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.5); z-index:9999;">
			<p>No video ads available at the moment. Please wait! </p>
			<button onclick="document.getElementById('ad-popup').style.display='none'">Close</button>
		</div>

		<script>

			// --- স্ক্রিপ্টের একদম শুরুতে একবারই ইনিশিয়ালাইজ করবেন ---
			const rewardedController = window.Adsgram.init({ blockId: "32174" });
			const interstitialController = window.Adsgram.init({ blockId: "int-32178" });

			

			// --- ফাংশনগুলো ---

			function showAd_id0() {
			show_11042210().then(() => {
			// অ্যাড সাকসেস হলে এই আইডি সেভ হবে
			localStorage.setItem('last_ad_id', 0);

			// টাইমার ও রিওয়ার্ড কল
			start4MinuteTimer();
			triggerAdNetworkRequest();
			}).catch((e) => {
			// অ্যাড লোড না হলে বা এরর হলে পরবর্তী আইডিতে সুইচ করবে
			console.log("ID 0 failed, switching to next...");
			tryNextAd();
			});
			}



			function showAd_id1() {
			rewardedController.show().then((result) => {
			if (result.done) {
			// ১. সফল হলে আইডি সেভ করুন
			localStorage.setItem('last_ad_id', 1);

			// ২. টাইমার ও রিওয়ার্ড কল করুন
			start4MinuteTimer();
			triggerAdNetworkRequest();
			} else {
			// ৩. ইউজার স্কিপ করলে বা অ্যাড না দেখলে পরের আইডিতে সুইচ করুন
			tryNextAd();
			}
			}).catch((e) => {
			// ৪. এরর বা অ্যাড লোড না হলে পরের আইডিতে সুইচ করুন
			console.log("ID 1 failed or skipped, switching to next...");
			tryNextAd();
			});
			}


			function showAd_id2() {
			show_11042210('pop').then(() => {
			// ১. অ্যাড সাকসেস হলে আইডি সেভ করুন
			localStorage.setItem('last_ad_id', 2);

			// ২. টাইমার ও রিওয়ার্ড কল করুন
			start4MinuteTimer();
			triggerAdNetworkRequest();
			}).catch(e => {
			// ৩. এরর বা অ্যাড লোড না হলে পরের আইডিতে সুইচ করুন
			console.log("ID 2 failed, switching to next...");
			tryNextAd();
			});
			}


			function showAd_id3() {
			window.showGiga().then(() => {
			// ১. অ্যাড সাকসেস হলে আইডি সেভ করুন
			localStorage.setItem('last_ad_id', 3);

			// ২. টাইমার ও রিওয়ার্ড কল করুন
			start4MinuteTimer();
			triggerAdNetworkRequest();
			}).catch(e => {
			// ৩. এরর হলে পরের আইডিতে সুইচ করুন
			console.log("ID 3 failed, switching to next...");
			tryNextAd();
			});
			}


			function showAd_id4() {
			interstitialController.show().then((result) => {
			// ১. অ্যাড সফলভাবে শেষ হলে আইডি সেভ করুন
			localStorage.setItem('last_ad_id', 4);

			// ২. টাইমার ও রিওয়ার্ড কল করুন
			start4MinuteTimer();
			triggerAdNetworkRequest();
			}).catch((e) => {
			// ৩. এরর বা অ্যাড লোড না হলে পরের আইডিতে সুইচ করুন
			console.log("ID 4 failed, switching to next...");
			tryNextAd();
			});
			}


			function tryNextAd() {
			// ১. টাইমার চেক করা (ads_gap_timer)
			const expiryTime = localStorage.getItem('ads_gap_timer');

			// যদি টাইমার থাকে এবং তা বর্তমান সময়ের চেয়ে বেশি হয় (অর্থাৎ রানিং আছে)
			if (expiryTime && Date.now() < parseInt(expiryTime)) {
        // টাইমার রানিং, তাই পপআপ দেখাবে
        document.getElementById('ad-popup').style.display = 'block';
        return; // অ্যাড লোড করা বন্ধ করবে
    }

    // ২. যদি টাইমার না থাকে বা শেষ হয়ে যায় (টাইমার স্টপ)
    // তাহলে গতবারের সফল আইডি থেকে পরবর্তী আইডি বের করবে
    let lastId = parseInt(localStorage.getItem('last_ad_id')) || 0;
    let nextId = (lastId + 1) % 5;

    // নতুন আইডি সেভ করে নেয়া (যাতে পরেরবার এর পর থেকে শুরু হয়)
    localStorage.setItem('last_ad_id', nextId);

    console.log("Timer stopped. Trying Ad ID: " + nextId);

    // ৩. আইডি অনুযায়ী কল করা
    switch (nextId) {
        case 0: showAd_id0(); break;
        case 1: showAd_id1(); break;
        case 2: showAd_id2(); break;
        case 3: showAd_id3(); break;
        case 4: showAd_id4(); break;
    }
}




			// ৪ মিনিটের জন্য টাইমার ফাংশন
			function start4MinuteTimer() {
			const duration = 4 * 60 * 1000; // ৪ মিনিট মিলিসেকেন্ডে
			const expiryTime = Date.now() + duration;
			localStorage.setItem('ads_gap_timer', expiryTime);
			}


			function triggerAdNetworkRequest() {
			start5MinuteTimer();
			}


			
			
			
			let userCar = document.getElementById('userCar'), gameArea = document.getElementById('gameArea');
			let score = 0, mainBalance = 0, gameActive = false, carX = 160, speed = 8;

			// New States for 2x Booster
			let is2xActive = false;
			let remainingTime = 0;
			let countdownIntervalId = null;
			const CAR_STORAGE_KEY = 'car_game_balance';

			// স্পনিং ইন্টারভাল ট্র্যাকার (গেম ওভারের পর এগুলো রিসেট করার জন্য)
			let enemyIntervalId = null;
			let rewardIntervalId = null;

			function moveUserCar(dir) {
			const containerWidth = document.getElementById('gameArea').offsetWidth;
			const carWidth = 50;
			const limit = containerWidth - carWidth;

			if (dir === 'left') {
			carX -= 10;
			if (carX < 0) carX = 0;
				}
				if (dir === 'right') {
					carX += 10;
					if (carX > limit) carX = limit;
				}
				userCar.style.left = carX + 'px';
			}
        
			function bindButton(id, dir) {
				const btn = document.getElementById(id);
				let interval;
				btn.addEventListener('touchstart', (e) => { e.preventDefault(); interval = setInterval(() => moveUserCar(dir), 30); });
				btn.addEventListener('touchend', () => clearInterval(interval));
				btn.addEventListener('mousedown', () => { interval = setInterval(() => moveUserCar(dir), 30); });
				btn.addEventListener('mouseup', () => clearInterval(interval));
			}
			bindButton('leftBtn', 'left'); bindButton('rightBtn', 'right');

			function updateLocalStorageBalance() {
				localStorage.setItem(CAR_STORAGE_KEY, mainBalance);
				document.getElementById('mainBalance').innerText = mainBalance;
			}

			function collectPoints() {
    // ১. localStorage থেকে বর্তমান ব্যালেন্স চেক করা
    const currentStorageBalance = parseInt(localStorage.getItem('car_game_balance')) || 0;

    // ২. চেক করা যে ব্যালেন্স ১০০০ বা তার বেশি কি না
    if (currentStorageBalance < 1000) { 
        document.getElementById('messagePopup').style.display = 'flex'; 
    } else { 
        // ৩. userData থেকে userid সংগ্রহ করা
        const userDataString = localStorage.getItem('userData');
        let userid = "";
        
        if (userDataString) {
            try {
                const userData = JSON.parse(userDataString);
                userid = userData.userid;
            } catch (e) {
                console.error("User data parsing error:", e);
            }
        }

        // ৪. API-তে ডেটা পাঠানো (POST request)
        const postData = new FormData();
        postData.append('userid', userid);
        postData.append('amount', currentStorageBalance);

        fetch('https://apitask353.gritorax.com/apitask.php', {
            method: 'POST',
            body: postData
        })
        .catch(error => console.error("Error:", error));

        // ৫. গেমের ব্যালেন্স ও লোকাল স্টোরেজ রিসেট করা
        mainBalance = 0; // গেমের মেইন ভেরিয়েবল রিসেট
        localStorage.setItem('car_game_balance', 0); // লোকাল স্টোরেজ রিসেট
        
        // ৬. UI আপডেট করা
        document.getElementById('mainBalance').innerText = 0;
        document.getElementById('liveScore').innerText = "Score: 0";
        score = 0;

        alert("Balance collected successfully!");
    }
}

			// ফিক্সড রিস্টার্ট গেম ফাংশন - কোনো রিফ্রেশ ছাড়া টাইমার ধরে রাখবে
			function restartGame() {
				// ১. গেম ওভার স্ক্রিন হাইড করা
				document.getElementById('gameOverPopup').style.display = 'none';
				
				// ২. গেমের আগের তৈরি হওয়া সব এনিমি ও রিওয়ার্ড অবজেক্ট স্ক্রিন থেকে ডিলিট করা
				document.querySelectorAll('.enemy, .reward, .plusOne').forEach(obj => obj.remove());
				
				// ৩. স্কোর এবং ইউজারের গাড়ির পজিশন ডিফল্ট করা
				score = 0;
				document.getElementById('liveScore').innerText = "Score: 0";
				carX = 160;
				userCar.style.left = carX + 'px';
				
				// ৪. আবার স্টার্ট স্ক্রিন ফিরিয়ে আনা (কোনো রিফ্রেশ ছাড়া)
				document.getElementById('startScreen').style.display = 'flex';
			}

			document.getElementById('startBtn').addEventListener('click', () => {
				document.getElementById('startScreen').style.display = 'none';
				gameActive = true;
				
				// আগের কোনো ইন্টারভাল থেকে থাকলে তা ক্লিয়ার করা
				if(enemyIntervalId) clearInterval(enemyIntervalId);
				if(rewardIntervalId) clearInterval(rewardIntervalId);
				
				enemyIntervalId = setInterval(() => { if(gameActive) spawnObject('enemy'); }, 1000);
				rewardIntervalId = setInterval(() => { if(gameActive) spawnObject('reward'); }, 2500);
			});

			function spawnObject(type) {
				let el = document.createElement('div'), attempts = 0, isOverlapping, x;
				
				do {
					isOverlapping = false;
					x = Math.floor(Math.random() * 320); 
					document.querySelectorAll('.obj').forEach(o => {
						if (o !== el && Math.abs(parseInt(o.style.left) - x) < 65 && parseInt(o.style.top) < 180) {
							isOverlapping = true;
						}
					});
					attempts++;
				} while (isOverlapping && attempts < 15);

				if (isOverlapping) return;

				el.className = 'obj ' + type;
				el.style.left = x + 'px';
				el.style.top = '-80px';
				gameArea.appendChild(el);

				let move = setInterval(() => {
					if(!gameActive) { clearInterval(move); el.remove(); return; }
					el.style.top = (parseInt(el.style.top) + speed) + 'px';
					
					let uR = userCar.getBoundingClientRect(), eR = el.getBoundingClientRect();
					
					if (eR.bottom > uR.top + 15 && eR.top < uR.bottom - 15 && eR.right > uR.left + 15 && eR.left < uR.right - 15) {
						if(type === 'enemy') { 
							gameActive = false; 
							
							// ইন্টারভালগুলো স্টপ করা
							clearInterval(enemyIntervalId);
							clearInterval(rewardIntervalId);
							
							document.getElementById('finalScoreDisplay').innerText = score;
							
							mainBalance += score;
							updateLocalStorageBalance();
							
							document.getElementById('gameOverPopup').style.display = 'flex'; 
							clearInterval(move); 
						} else {
							let pointsToAdd = is2xActive ? 2 : 1;
							score += pointsToAdd; 
							
							document.getElementById('liveScore').innerText = "Score: " + score;
							
							let p = document.createElement('div'); 
							p.className = "plusOne"; 
							p.innerText = "+" + pointsToAdd; 
							p.style.left = el.style.left; 
							p.style.top = el.style.top;
							gameArea.appendChild(p); 
							
							setTimeout(() => p.remove(), 1000);
							el.remove(); 
							clearInterval(move);
						}
					}
					if(parseInt(el.style.top) > 700) { el.remove(); clearInterval(move); }
				}, 20);
			}

			// ==========================================================================
			// TIMING & BOOSTER FUNCTIONS
			// ==========================================================================
			function start5MinuteTimer() {
				is2xActive = true;
				remainingTime = 300; 

				if (countdownIntervalId !== null) clearInterval(countdownIntervalId);
				updateUIState();

				countdownIntervalId = setInterval(() => {
					remainingTime--;
					updateUIState();

					if (remainingTime <= 0) {
			clearInterval(countdownIntervalId);
			is2xActive = false;
			updateUIState();
			}
			}, 1000);
			}

			function updateUIState() {
			let adButton = document.getElementById('watch-ad-button');
			let timerBox = document.getElementById('premium-countdown-box');
			let timerText = document.getElementById('timer-display-text');

			if (is2xActive && remainingTime > 0) {
			adButton.style.display = "none";
			timerBox.style.display = "block";

			let minutes = Math.floor(remainingTime / 60);
			let seconds = remainingTime % 60;
			seconds = seconds < 10 ? '0' + seconds : seconds;
					timerText.innerHTML = `2x Boost Active: ${minutes}:${seconds}`;
				} else {
					adButton.style.display = "flex";
					timerBox.style.display = "none";
				}
			}

	

			window.onload = () => {
				if (localStorage.getItem(CAR_STORAGE_KEY)) {
					mainBalance = parseInt(localStorage.getItem(CAR_STORAGE_KEY));
				} else {
					mainBalance = 0;
				}
				document.getElementById('mainBalance').innerText = mainBalance;

				is2xActive = false;
				updateUIState();
			};

			function goToDashboard() {
				window.location.href = "https://dashboard.gritorax.com";
			}

			history.pushState(null, null, window.location.href);
			window.addEventListener('popstate', function(event) {
				window.location.href = "https://dashboard.gritorax.com";
			});
		</script>
